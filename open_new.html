<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amazon 快捷查询助手</title>
  <style>
    /* 基础重置与变量 */
    :root {
      --bg-color: #f4f7f6;
      --card-bg: #ffffff;
      --text-main: #333333;
      --amazon-color: #ff9900;
      --amazon-hover: #e68a00;
      --radius: 12px;
      --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      color: #2c3e50;
    }

    /* 卡片网格布局：自动适应，宽屏下左右等分两列 */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 24px;
      width: 100%;
      max-width: 900px; /* 两个卡片，调整最大宽度让排版更紧凑 */
    }

    .card {
      background: var(--card-bg);
      padding: 24px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2 {
      margin-top: 0;
      font-size: 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 输入框通用样式 */
    input[type="text"],
    textarea {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 16px;
      border: 1px solid #dce1e6;
      border-radius: 8px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.3s ease;
      font-family: inherit;
      resize: vertical;
    }

    input[type="text"]:focus,
    textarea:focus {
      border-color: #a0b3c6;
    }

    textarea {
      min-height: 120px;
      flex-grow: 1; /* 让文本域自动撑满剩余空间，对齐右侧 */
    }

    /* 按钮通用样式 */
    button {
      width: 100%;
      padding: 12px 0;
      margin-top: 16px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: #111; /* 亚马逊黄底黑字 */
      background-color: var(--amazon-color);
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: var(--amazon-hover);
    }

    /* 批量输入的帮助文本 */
    .help-text {
      font-size: 12px;
      color: #888;
      margin-top: 8px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Amazon 快捷查询助手</h1>
  </div>

  <div class="container">
    
    <div class="card">
      <h2>📦 Amazon 批量查询</h2>
      <textarea id="amazon-bulk-input" placeholder="输入多个 ASIN，每行一个&#10;B08N5WRWNW&#10;B09G9FPHY6"></textarea>
      <div class="help-text">*请确保浏览器允许此网站弹出多个窗口</div>
      <button onclick="openAmazonBulk()">批量打开</button>
    </div>

    <div class="card">
      <h2>🛒 Amazon 单个查询</h2>
      <input type="text" id="amazon-single-input" placeholder="输入单个 ASIN (如 B08N5WRWNW)">
      <button onclick="openAmazonSingle()">打开 Amazon</button>
    </div>

  </div>

  <script>
    // Amazon 单个打开
    function openAmazonSingle() {
      const inputElement = document.getElementById("amazon-single-input");
      const asin = inputElement.value.trim();
      if (!asin) return;
      
      const url = "https://amazon.com/dp/" + asin;
      window.open(url, '_blank');
      inputElement.value = ""; 
    }

    // Amazon 批量打开
    function openAmazonBulk() {
      const inputElement = document.getElementById("amazon-bulk-input");
      const rawText = inputElement.value;
      
      const asinList = rawText.split('\n').map(asin => asin.trim()).filter(asin => asin !== '');
      
      if (asinList.length === 0) return;

      if (asinList.length > 5) {
        const confirmOpen = confirm(`即将同时打开 ${asinList.length} 个标签页。这可能会被浏览器当作广告弹窗拦截，确定继续吗？`);
        if (!confirmOpen) return;
      }

      asinList.forEach(asin => {
        const url = "https://amazon.com/dp/" + asin;
        window.open(url, '_blank'); 
      });
      
      inputElement.value = ""; 
    }
  </script>

</body>
</html>
